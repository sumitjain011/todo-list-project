<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>To-Do App</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <div class="container">

    <div class="top-bar">

      <h1>To-Do App</h1>

      <button id="themeBtn">
        Dark Mode
      </button>

    </div>

    <div class="input-section">

      <input
        type="text"
        id="taskInput"
        placeholder="Enter task"
      >

      <input
        type="date"
        id="dueDate"
      >

      <button id="addBtn">
        Add Task
      </button>

    </div>

    <ul id="taskList"></ul>

  </div>

  <script src="script.js"></script>

</body>
</html>
